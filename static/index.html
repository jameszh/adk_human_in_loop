<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reimbursement Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .chat-container { width: 480px; height: 680px; background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.12); display: flex; flex-direction: column; overflow: hidden; }
    .chat-header { background: #2563eb; color: #fff; padding: 16px 20px; font-weight: 600; font-size: 16px; display: flex; align-items: center; gap: 10px; }
    .chat-header .dot { width: 10px; height: 10px; background: #4ade80; border-radius: 50%; }
    .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .msg { max-width: 80%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.5; word-break: break-word; }
    .msg.user { align-self: flex-end; background: #2563eb; color: #fff; border-bottom-right-radius: 4px; }
    .msg.agent { align-self: flex-start; background: #f1f5f9; color: #1e293b; border-bottom-left-radius: 4px; }
    .msg.pending { align-self: flex-start; background: #fef9c3; color: #713f12; border: 1px solid #fde047; border-bottom-left-radius: 4px; }
    .msg.approved { align-self: flex-start; background: #dcfce7; color: #14532d; border: 1px solid #86efac; border-bottom-left-radius: 4px; }
    .msg.rejected { align-self: flex-start; background: #fee2e2; color: #7f1d1d; border: 1px solid #fca5a5; border-bottom-left-radius: 4px; }
    .msg .label { font-size: 11px; font-weight: 600; margin-bottom: 4px; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.05em; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #fde047; border-top-color: #713f12; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .input-area { padding: 16px; border-top: 1px solid #e2e8f0; display: flex; gap: 10px; }
    .input-area input { flex: 1; padding: 10px 14px; border: 1px solid #cbd5e1; border-radius: 24px; font-size: 14px; outline: none; transition: border-color 0.2s; }
    .input-area input:focus { border-color: #2563eb; }
    .input-area button { padding: 10px 18px; background: #2563eb; color: #fff; border: none; border-radius: 24px; font-size: 14px; cursor: pointer; transition: background 0.2s; }
    .input-area button:hover { background: #1d4ed8; }
    .input-area button:disabled { background: #94a3b8; cursor: not-allowed; }
  </style>
</head>
<body>
<div class="chat-container">
  <div class="chat-header">
    <div class="dot"></div>
    Reimbursement Agent
  </div>
  <div class="messages" id="messages">
    <div class="msg agent"><div class="label">Agent</div>Hi! I can help with reimbursement requests. Try: "Reimburse $200 for conference travel"</div>
  </div>
  <div class="input-area">
    <input id="input" type="text" placeholder="Type a message..." autocomplete="off" />
    <button id="send">Send</button>
  </div>
</div>

<script>
  const SESSION_ID = 'session-' + Math.random().toString(36).slice(2, 10);
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send');

  function addMessage(text, type) {
    const labels = { user: 'You', agent: 'Agent', pending: '⏳ Awaiting Approval', approved: '✅ Approved', rejected: '❌ Rejected' };
    const div = document.createElement('div');
    div.className = `msg ${type}`;
    div.innerHTML = `<div class="label">${labels[type] || type}</div>${text}`;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  async function pollStatus(ticketId, pendingMsgEl) {
    while (true) {
      await new Promise(r => setTimeout(r, 2000));
      const res = await fetch(`/status/${ticketId}`);
      const data = await res.json();
      if (data.status === 'approved' || data.status === 'rejected') {
        pendingMsgEl.remove();
        addMessage(data.result || `Request ${data.status}.`, data.status);
        sendBtn.disabled = false;
        inputEl.disabled = false;
        break;
      }
    }
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = '';
    sendBtn.disabled = true;
    inputEl.disabled = true;

    addMessage(text, 'user');

    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: SESSION_ID, message: text }),
    });
    const data = await res.json();

    if (data.status === 'pending_approval') {
      const pendingEl = addMessage(
        `<span class="spinner"></span>${data.response}<br><small>Ticket: <code>${data.ticket_id}</code> — Check Telegram to approve.</small>`,
        'pending'
      );
      pollStatus(data.ticket_id, pendingEl);
      // keep input disabled while waiting
    } else {
      addMessage(data.response, 'agent');
      sendBtn.disabled = false;
      inputEl.disabled = false;
    }
  }

  sendBtn.addEventListener('click', sendMessage);
  inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
</script>
</body>
</html>
